      summary: Historical Execution Query
      description: |
        Query historical execution (fill) records. Supports filtering by time range, order ID,
        and symbol, with pagination.

        ## CLI

        ```bash
        longbridge executions --history
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/trade/execution/history?start_at=1740000000&end_at=1774400000&page=1"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "trades": [
              {
                "trade_id": "218942971868942337",
                "order_id": "218942971868942336",
                "symbol": "NVDA.US",
                "price": "177.50",
                "quantity": "10",
                "trade_done_at": "1774330500"
              }
            ],
            "has_more": false
          }
        }
        ```
      tags:
        - Trade Execution & Order Management
      parameters:
        - name: start_at
          in: query
          required: false
          description: Query range start time as a Unix timestamp (seconds).
          schema:
            type: integer
            nullable: true
        - name: end_at
          in: query
          required: false
          description: Query range end time as a Unix timestamp (seconds).
          schema:
            type: integer
            nullable: true
        - name: order_id
          in: query
          required: false
          description: Filter by order ID.
          schema:
            type: string
            nullable: true
        - name: symbol
          in: query
          required: false
          description: 'Filter by security symbol (e.g. `NVDA.US`).'
          schema:
            type: string
            nullable: true
            maxLength: 32
            minLength: 4
            pattern: '^([\w.]*\.[A-Za-z][A-Za-z])$'
        - name: page
          in: query
          required: false
          description: Page number (1-based).
          schema:
            type: integer
            nullable: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      trades:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
