  /trade/order/today:
    get:
      operationId: list_today_orders
      summary: Today's Order Query
      description: |
        Query today's orders with support for multi-condition filtering.

        ## CLI

        ```bash
        longbridge orders
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/trade/order/today"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "orders": [
              {
                "order_id": "1220968184320942080",
                "status": "CanceledStatus",
                "stock_name": "英伟达",
                "quantity": "10",
                "executed_quantity": "0",
                "price": "",
                "executed_price": "0",
                "submitted_at": "1774330299",
                "side": "Buy",
                "symbol": "NVDA.US",
                "order_type": "MIT",
                "last_done": "",
                "trigger_price": "177.88",
                "msg": "",
                "tag": "Normal",
                "time_in_force": "Day",
                "expire_date": "2026-03-24",
                "updated_at": "1774330401",
                "trigger_at": "0",
                "trailing_amount": "",
                "trailing_percent": "",
                "limit_offset": "",
                "trigger_status": "DEACTIVE",
                "outside_rth": "RTH_ONLY",
                "currency": "USD",
                "remark": "",
                "limit_depth_level": 0,
                "trigger_count": 0,
                "monitor_price": ""
              }
            ],
            "has_more": false
          }
        }
        ```
      tags:
        - Trade Execution & Order Management
      parameters:
        - name: symbol
          in: query
          required: false
          description: 'Filter by security symbol (e.g. `NVDA.US`).'
          schema:
            type: string
            nullable: true
            maxLength: 32
            minLength: 4
            pattern: '^([\w.]*\.[A-Za-z][A-Za-z])$'
        - name: market
          in: query
          required: false
          description: Filter by market. One of `US`, `HK`, `SH`, `SZ`, `SG`, `AU`, `JP`, `UK`, `DE`.
          schema:
            type: string
            nullable: true
            enum:
              - UnknownMarket
              - DE
              - SH
              - US
              - AU
              - HK
              - JP
              - SZ
              - SG
              - UK
        - name: side
          in: query
          required: false
          description: Filter by order side. One of `Buy`, `Sell`.
          schema:
            type: string
            nullable: true
            enum:
              - UnknownSide
              - Buy
              - Sell
        - name: status
          in: query
          required: false
          description: Filter by one or more order statuses.
          schema:
            type: array
            nullable: true
            items:
              type: string
              enum:
                - UnknownOrderStatus
                - VarietiesNotReported
                - WaitToCancel
                - NotReported
                - ReplacedNotReported
                - NewStatus
                - PendingReplaceStatus
                - RejectedStatus
                - CanceledStatus
                - PartialWithdrawal
                - FilledStatus
                - WaitToReplace
                - PartialFilledStatus
                - PendingCancelStatus
                - ExpiredStatus
                - ProtectedNotReported
                - WaitToNew
                - ReplacedStatus
        - name: order_id
          in: query
          required: false
          description: Filter by order ID.
          schema:
            type: string
            nullable: true
        - name: page
          in: query
          required: false
          description: Page number (1-based).
          schema:
            type: integer
            nullable: true
        - name: size
          in: query
          required: false
          description: Number of records per page.
          schema:
            type: integer
            nullable: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      orders:
                        type: array
                        nullable: true
                        items:
                          $ref: '#/components/schemas/Order'
                      has_more:
                        type: boolean
                        nullable: true
                        description: Whether more records exist on the next page.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://openapi.longbridge.com/oauth2/authorize
          tokenUrl: https://openapi.longbridge.com/oauth2/token
          scopes:
            openapi: Full OpenAPI access
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code.
        message:
          type: string
          description: Error message.
        data:
          nullable: true
          description: Always `null` for error responses.
    Order:
      type: object
      description: Standard order object returned in order list endpoints.
      properties:
        order_id:
          type: string
          nullable: true
          description: Order ID.
        status:
          type: string
          nullable: true
          description: Order status (e.g. `NewStatus`, `FilledStatus`, `CanceledStatus`).
        stock_name:
          type: string
          nullable: true
          description: Security display name.
        quantity:
          type: string
          nullable: true
          description: Ordered quantity.
        executed_quantity:
          type: string
          nullable: true
          description: Filled quantity.
        price:
          type: string
          nullable: true
          description: Limit price (empty for market orders).
        executed_price:
          type: string
          nullable: true
          description: Average fill price.
        submitted_at:
          type: string
          nullable: true
          description: Unix timestamp (seconds) when the order was submitted.
        side:
          type: string
          nullable: true
          description: Order side. One of `Buy`, `Sell`.
        symbol:
          type: string
          nullable: true
          description: Security symbol.
        order_type:
          type: string
          nullable: true
          description: Order type (e.g. `LO`, `MO`, `MIT`).
        last_done:
          type: string
          nullable: true
          description: Last execution price.
        trigger_price:
          type: string
          nullable: true
          description: Trigger price for MIT/LIT orders.
        msg:
          type: string
          nullable: true
          description: Order message or rejection reason.
        tag:
          type: string
          nullable: true
          description: Order tag (e.g. `Normal`, `GTC`).
        time_in_force:
          type: string
          nullable: true
          description: Time-in-force (e.g. `Day`, `GTC`, `GTD`).
        expire_date:
          type: string
          nullable: true
          description: Order expiry date in `YYYY-MM-DD` format (for GTD orders).
        updated_at:
          type: string
          nullable: true
          description: Unix timestamp (seconds) of the last status update.
        trigger_at:
          type: string
          nullable: true
          description: Unix timestamp (seconds) when the trigger condition was met.
        trailing_amount:
          type: string
          nullable: true
          description: Trailing stop amount.
        trailing_percent:
          type: string
          nullable: true
          description: Trailing stop percentage.
        limit_offset:
          type: string
          nullable: true
          description: Limit offset for LIT orders.
        trigger_status:
          type: string
          nullable: true
          description: Trigger status (e.g. `ACTIVE`, `DEACTIVE`, `TRIGGERED`).
        outside_rth:
          type: string
          nullable: true
          description: Extended-hours setting. One of `RTH_ONLY`, `ANY_TIME`, `OVERNIGHT`.
        currency:
          type: string
          nullable: true
          description: Settlement currency.
        remark:
          type: string
          nullable: true
          description: Order remark.
        limit_depth_level:
          type: integer
          nullable: true
          description: Limit depth level (for ELO orders).
        trigger_count:
          type: integer
          nullable: true
          description: Number of times the trigger has fired.
        monitor_price:
          type: string
          nullable: true
          description: Monitor price for conditional orders.
