openapi: 3.0.3
info:
  title: Longbridge OpenAPI
  description: |
    Longbridge OpenAPI provides programmatic access to market data, trading, account management,
    watchlist management, and content queries for the Longbridge trading platform.
  version: '1.0.0'
servers:
  - url: https://openapi.longbridge.com
    description: Global
  - url: https://openapi.longbridge.cn
    description: China mainland
tags:
  - name: Watchlist Management
    description: Manage user watchlist groups (list/create/update/delete) and query the securities contained in each group. Supports adding, removing, or replacing securities within a group.
  - name: Market Temperature
    description: Query the Market Temperature indicator (a fear-gauge-like sentiment thermometer, scored 0–100 where higher means more bullish) across equity markets. Supports fetching the current snapshot and historical time series for sentiment measurement, trend visualization, and comparative analysis.
  - name: Portfolio & Cash
    description: Provides read access to account asset and cash information, including fund holdings, stock holdings, account cash balance, and cash flow history for portfolio overview, position display, and reconciliation analysis.
  - name: News & Filings
    description: Query regulatory filings, news articles, and community discussion topics for a given symbol. Suitable for investment research, news monitoring, and content aggregation.
  - name: Community
    description: Interact with the Longbridge community. Supports listing your published topics with pagination and type filtering, and creating new topics (long-form articles or short posts) with associated tickers, hashtags, and license settings.
  - name: Trade Execution & Order Management
    description: Full order lifecycle management including order detail queries, today's and historical order queries, today's and historical execution reports, order modification, order cancellation, and pre-order maximum purchasable quantity estimation.
security:
  - oauth2:
      - openapi
paths:
  /watchlist/groups:
    get:
      operationId: list_watchlist_groups
      summary: Get Watchlist Group List
      description: |
        Get all watchlist groups for the current user. Each group contains an ID, name, and a list
        of securities with the price and timestamp at which each security was added.

        ## CLI

        ```bash
        longbridge watchlist
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/watchlist/groups"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "groups": [
              {
                "id": "2630",
                "name": "My Watchlist",
                "securities": [
                  {
                    "symbol": "AAPL.US",
                    "market": "US",
                    "name": "Apple Inc.",
                    "watched_price": "211.59",
                    "watched_at": "1741690995"
                  },
                  {
                    "symbol": "700.HK",
                    "market": "HK",
                    "name": "腾讯控股",
                    "watched_price": "460.00",
                    "watched_at": "1725511157"
                  }
                ]
              }
            ]
          }
        }
        ```
      tags:
        - Watchlist Management
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: Response code. `0` indicates success.
                  message:
                    type: string
                    description: Response message.
                  data:
                    type: object
                    properties:
                      groups:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Group ID.
                            name:
                              type: string
                              description: Group name.
                            securities:
                              type: array
                              nullable: true
                              items:
                                type: object
                                properties:
                                  symbol:
                                    type: string
                                    description: Security symbol (e.g. `AAPL.US`).
                                  market:
                                    type: string
                                    description: Market code. One of `US`, `HK`, `SH`, `SZ`, `SG`.
                                  name:
                                    type: string
                                    description: Security display name.
                                  watched_price:
                                    type: string
                                    description: Price at the time the security was added to the watchlist.
                                  watched_at:
                                    type: string
                                    description: Unix timestamp (seconds) when the security was added.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: create_watchlist_group
      summary: Create Watchlist Group
      description: |
        Create a new watchlist group, optionally pre-populated with securities.

        ## CLI

        ```bash
        longbridge watchlist create "NAME"
        ```

        ## Code sample

        ```shell
        curl -L \
          -X POST \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          -H "Content-Type: application/json" \
          -d '{"name":"My Tech Stocks","securities":["AAPL.US","NVDA.US"]}' \
          "https://openapi.longbridge.com/watchlist/groups"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "id": "4303353"
          }
        }
        ```
      tags:
        - Watchlist Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  description: Group name. Must be at least 1 character and within the system name length limit.
                securities:
                  type: array
                  nullable: true
                  description: Optional list of security symbols to pre-populate the group on creation (e.g. `["AAPL.US", "700.HK"]`).
                  items:
                    type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: ID of the newly created group.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: update_watchlist_group
      summary: Update Watchlist Group
      description: |
        Update the name or member list of a watchlist group. Use `mode` to control how
        `securities` are applied: `add` appends, `remove` removes, `replace` overwrites the entire list.

        ## CLI

        ```bash
        longbridge watchlist update <ID>
        ```

        ## Code sample

        ```shell
        curl -L \
          -X PUT \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          -H "Content-Type: application/json" \
          -d '{"id":"4303353","name":"Renamed Group","mode":"add","securities":["TSLA.US"]}' \
          "https://openapi.longbridge.com/watchlist/groups"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {}
        }
        ```
      tags:
        - Watchlist Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  description: ID of the group to update (required).
                name:
                  type: string
                  nullable: true
                  description: New group name. Omit to keep the existing name.
                mode:
                  type: string
                  nullable: true
                  enum:
                    - add
                    - remove
                    - replace
                  description: |
                    Operation mode for the `securities` list. One of:
                    - `add` — append securities to the group
                    - `remove` — remove securities from the group
                    - `replace` — replace all securities in the group
                securities:
                  type: array
                  nullable: true
                  description: List of security symbols affected by the operation (e.g. `["AAPL.US", "700.HK"]`).
                  items:
                    type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: delete_watchlist_group
      summary: Delete Watchlist Group
      description: |
        Delete the specified watchlist group. Set `purge=true` to also clear all securities
        from the group before deletion.

        ## CLI

        ```bash
        longbridge watchlist delete <ID>
        ```

        ## Code sample

        ```shell
        curl -L \
          -X DELETE \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/watchlist/groups?id=4303353&purge=true"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {}
        }
        ```
      tags:
        - Watchlist Management
      parameters:
        - name: id
          in: query
          required: true
          description: ID of the group to delete.
          schema:
            type: string
        - name: purge
          in: query
          required: false
          description: If `true`, clears all securities from the group before deleting. Defaults to `false`.
          schema:
            type: boolean
            nullable: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /quote/get_security_list:
    get:
      operationId: list_securities
      summary: Query Tradable Securities List
      description: |
        Query the list of tradable securities filtered by market and category. Primarily used to
        retrieve securities eligible for extended-hours (pre-market / after-hours) trading sessions.
        Both `market` and `category` are required parameters.

        ## CLI

        ```bash
        longbridge security-list
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/quote/get_security_list?market=US&category=overnight"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "list": [
              {
                "symbol": "AAPL.US",
                "name_cn": "苹果",
                "name_hk": "蘋果",
                "name_en": "Apple Inc."
              }
            ]
          }
        }
        ```
      tags:
        - Watchlist Management
      parameters:
        - name: market
          in: query
          required: true
          description: Market code. One of `US`, `HK`.
          schema:
            type: string
        - name: category
          in: query
          required: true
          description: Security category filter for the target trading session (e.g. `overnight` for US overnight-tradable securities).
          schema:
            type: string
            nullable: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            symbol:
                              type: string
                              nullable: true
                              description: Security symbol (e.g. `AAPL.US`).
                            name_cn:
                              type: string
                              nullable: true
                              description: Simplified Chinese name.
                            name_hk:
                              type: string
                              nullable: true
                              description: Traditional Chinese name.
                            name_en:
                              type: string
                              nullable: true
                              description: English name.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /quote/history_market_temperature:
    get:
      operationId: list_market_temperature
      summary: Get Historical Market Temperature
      description: |
        Get the historical market temperature time series for the specified market within a date range.
        Each data point contains the daily temperature, valuation, and sentiment scores (all scored 0–100).

        ## CLI

        ```bash
        longbridge market-temp [MARKET] --history --start YYYY-MM-DD --end YYYY-MM-DD
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/quote/history_market_temperature?market=US&start_date=20250101&end_date=20250110"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "list": [
              {
                "timestamp": "1735794000",
                "temperature": 58,
                "valuation": 54,
                "sentiment": 61
              },
              {
                "timestamp": "1735880400",
                "temperature": 59,
                "valuation": 56,
                "sentiment": 63
              }
            ],
            "type": "day"
          }
        }
        ```
      tags:
        - Market Temperature
      parameters:
        - name: market
          in: query
          required: true
          description: |
            Market code. One of:
            - `HK` — Hong Kong
            - `US` — United States
            - `CN` — A-shares
            - `SG` — Singapore
          schema:
            type: string
        - name: start_date
          in: query
          required: true
          description: Start date in `YYYYMMDD` format (e.g. `20250101`).
          schema:
            type: string
        - name: end_date
          in: query
          required: true
          description: End date in `YYYYMMDD` format (e.g. `20250110`).
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            timestamp:
                              type: string
                              description: Unix timestamp (seconds) of the data point.
                            temperature:
                              type: integer
                              description: Overall market temperature score (0–100).
                            valuation:
                              type: integer
                              description: Valuation sub-score (0–100).
                            sentiment:
                              type: integer
                              description: Sentiment sub-score (0–100).
                      type:
                        type: string
                        description: Granularity of the data series. Currently always `"day"`.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /quote/market_temperature:
    get:
      operationId: market_temperature
      summary: Get Current Market Temperature
      description: |
        Get the current sentiment temperature snapshot for the specified market.
        Scores range from 0–100; a higher value indicates a more bullish market.

        ## CLI

        ```bash
        longbridge market-temp [MARKET]
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/quote/market_temperature?market=US"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "temperature": 70,
            "description": "温度温暖并快速上升中",
            "valuation": 59,
            "sentiment": 82,
            "updated_at": "1774317902"
          }
        }
        ```
      tags:
        - Market Temperature
      parameters:
        - name: market
          in: query
          required: true
          description: |
            Market code. One of:
            - `HK` — Hong Kong
            - `US` — United States
            - `CN` — A-shares
            - `SG` — Singapore
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      temperature:
                        type: integer
                        description: Overall market temperature score (0–100).
                      description:
                        type: string
                        nullable: true
                        description: Human-readable description of the current temperature level.
                      valuation:
                        type: integer
                        description: Valuation sub-score (0–100).
                      sentiment:
                        type: integer
                        description: Sentiment sub-score (0–100).
                      updated_at:
                        type: string
                        description: Unix timestamp (seconds) of the last data update.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asset/cashflow:
    get:
      operationId: list_cash_flow
      summary: Cash Flow Query
      description: |
        Query account cash flow history. Covers deposit, withdrawal, dividends, settlement,
        and other business types. Supports time range and pagination.

        ## CLI

        ```bash
        longbridge cash-flow
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/asset/cashflow?start_time=1740000000&end_time=1774400000&page=1&size=20"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "list": [
              {
                "transaction_flow_name": "在途分红",
                "direction": 1,
                "business_type": 0,
                "balance": "13.65",
                "currency": "USD",
                "business_time": "1771826509",
                "symbol": "MSFT.US",
                "description": "MSFT.US Cash Dividend: 0.91 USD per share(in transit)"
              }
            ]
          }
        }
        ```
      tags:
        - Portfolio & Cash
      parameters:
        - name: start_time
          in: query
          required: false
          description: Query range start time as a Unix timestamp (seconds).
          schema:
            type: integer
            nullable: true
        - name: end_time
          in: query
          required: false
          description: Query range end time as a Unix timestamp (seconds).
          schema:
            type: integer
            nullable: true
        - name: business_type
          in: query
          required: false
          description: Business type filter (integer). Omit to return all types.
          schema:
            type: integer
            nullable: true
        - name: symbol
          in: query
          required: false
          description: Filter by security symbol (e.g. `AAPL.US`). Supports multiple values.
          schema:
            type: array
            nullable: true
            items:
              type: string
        - name: page
          in: query
          required: false
          description: Page number (1-based). Defaults to `1`.
          schema:
            type: integer
            nullable: true
        - name: size
          in: query
          required: false
          description: Number of records per page. Defaults to `20`.
          schema:
            type: integer
            nullable: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            transaction_flow_name:
                              type: string
                              nullable: true
                              description: Human-readable flow name.
                            business_type:
                              type: integer
                              nullable: true
                              description: Business type code (integer).
                            direction:
                              type: integer
                              nullable: true
                              description: Flow direction. `1` = inflow, `2` = outflow.
                            balance:
                              type: string
                              nullable: true
                              description: Transaction amount (decimal string).
                            currency:
                              type: string
                              nullable: true
                              description: Currency code (e.g. `USD`, `HKD`).
                            business_time:
                              type: string
                              nullable: true
                              description: Unix timestamp (seconds) of the transaction.
                            symbol:
                              type: string
                              nullable: true
                              description: Associated security symbol, if any.
                            description:
                              type: string
                              nullable: true
                              description: Transaction description.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asset/account:
    get:
      operationId: account_cash
      summary: Account Cash Information Query
      description: |
        Query account cash balance, buying power, margin details, and per-currency cash breakdown.

        ## CLI

        ```bash
        longbridge balance
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/asset/account"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "list": [
              {
                "total_cash": "456943.18",
                "max_finance_amount": "3200000.00",
                "remaining_finance_amount": "3654289.90",
                "risk_level": "0",
                "margin_call": "0",
                "currency": "HKD",
                "net_assets": "962678.11",
                "init_margin": "141090.88",
                "maintenance_margin": "123141.91",
                "buy_power": "821587.22",
                "frozen_transaction_fees": [],
                "cash_infos": [
                  {
                    "currency": "USD",
                    "withdraw_cash": "-38665.68",
                    "available_cash": "-38665.68",
                    "frozen_cash": "332.19",
                    "settling_cash": "-10108.02",
                    "redemption_cash": "0.00"
                  },
                  {
                    "currency": "HKD",
                    "withdraw_cash": "755592.21",
                    "available_cash": "755592.21",
                    "frozen_cash": "64.69",
                    "settling_cash": "-27760.00",
                    "redemption_cash": "0.00"
                  }
                ]
              }
            ]
          }
        }
        ```
      tags:
        - Portfolio & Cash
      parameters:
        - name: currency
          in: query
          required: false
          description: Filter by currency code (e.g. `USD`, `HKD`). Omit to return all currencies.
          schema:
            type: string
            nullable: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            total_cash:
                              type: string
                              nullable: true
                              description: Total cash balance (decimal string, in `currency`).
                            max_finance_amount:
                              type: string
                              nullable: true
                              description: Maximum financing amount available.
                            remaining_finance_amount:
                              type: string
                              nullable: true
                              description: Remaining financing amount available.
                            risk_level:
                              type: string
                              nullable: true
                              description: Account risk level code.
                            margin_call:
                              type: string
                              nullable: true
                              description: Margin call amount. `"0"` means no margin call.
                            currency:
                              type: string
                              nullable: true
                              description: Base currency of this sub-account.
                            net_assets:
                              type: string
                              nullable: true
                              description: Net asset value.
                            init_margin:
                              type: string
                              nullable: true
                              description: Initial margin requirement.
                            maintenance_margin:
                              type: string
                              nullable: true
                              description: Maintenance margin requirement.
                            buy_power:
                              type: string
                              nullable: true
                              description: Available buying power.
                            frozen_transaction_fees:
                              type: array
                              nullable: true
                              description: List of frozen transaction fee items.
                              items:
                                type: object
                                properties:
                                  currency:
                                    type: string
                                    nullable: true
                                  frozen_transaction_fee:
                                    type: string
                                    nullable: true
                            cash_infos:
                              type: array
                              nullable: true
                              description: Per-currency cash breakdown.
                              items:
                                type: object
                                properties:
                                  currency:
                                    type: string
                                    nullable: true
                                  withdraw_cash:
                                    type: string
                                    nullable: true
                                    description: Withdrawable cash amount.
                                  available_cash:
                                    type: string
                                    nullable: true
                                    description: Available cash amount.
                                  frozen_cash:
                                    type: string
                                    nullable: true
                                    description: Frozen cash amount.
                                  settling_cash:
                                    type: string
                                    nullable: true
                                    description: Cash pending settlement.
                                  redemption_cash:
                                    type: string
                                    nullable: true
                                    description: Cash pending fund redemption.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
