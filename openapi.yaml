      summary: Modify Order
      x-summary-zh: 修改订单
      description: |
        Modify the parameters of a pending order. Only orders in `NewStatus` or `PartialFilledStatus`
        can be modified.
      x-description-zh: 修改待成交订单的参数。仅 `NewStatus`（已报）或 `PartialFilledStatus`（部分成交）状态的订单可修改。
      tags:
