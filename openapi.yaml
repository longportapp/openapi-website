    put:
      operationId: replace_order
      summary: Modify Order
      description: |
        Modify the parameters of a pending order. Only orders in `NewStatus` or `PartialFilledStatus`
        can be modified.

        ## Code sample

        ```shell
        curl -L \
          -X PUT \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          -H "Content-Type: application/json" \
          -d '{"order_id":"1220968184320942080","price":"175.00","quantity":"5"}' \
          "https://openapi.longbridge.com/trade/order"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {}
        }
        ```
      tags:
        - Trade Execution & Order Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - order_id
              properties:
                order_id:
                  type: string
                  description: ID of the order to modify (required).
                quantity:
                  type: string
                  nullable: true
                  description: New quantity.
                  pattern: '^([1-9]\d*(\.\d+)?)$'
                price:
                  type: string
                  nullable: true
                  description: New limit price.
                  pattern: '^(0\.\d*[1-9]\d*|[1-9]\d*(\.\d+)?)$'
                trigger_price:
                  type: string
                  nullable: true
                  description: New trigger price (for MIT/LIT orders).
                  pattern: '^(0\.\d*[1-9]\d*|[1-9]\d*(\.\d+)?)$'
                limit_offset:
                  type: string
                  nullable: true
                  description: New limit offset (for LIT orders).
                  pattern: '^(\d*)$|^([0-9]\d*\.?\d*[1-9])$'
                trailing_amount:
                  type: string
                  nullable: true
                  description: New trailing amount (for TSLPAMT/TSMAMT orders).
                  pattern: '^(0\.\d*[1-9]\d*|[1-9]\d*(\.\d+)?)$'
                trailing_percent:
                  type: string
                  nullable: true
                  description: New trailing percentage (for TSMPCT/TSLPPCT orders).
                  pattern: '^(0\.\d*[1-9]\d*|[1-9]\d*(\.\d+)?)$'
                limit_depth_level:
                  type: integer
                  nullable: true
                  description: New limit depth level (for ELO orders).
                trigger_count:
                  type: integer
                  nullable: true
                  description: New trigger count.
                monitor_price:
                  type: string
                  nullable: true
                  description: New monitor price.
                remark:
                  type: string
                  nullable: true
                  maxLength: 255
                  description: Order remark (max 255 characters).
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: cancel_order
      summary: Cancel Order
      description: |
        Cancel a pending order. Only orders in `NewStatus` or `PartialFilledStatus` can be cancelled.
        After successful cancellation the order status changes to `CanceledStatus`.

        ## Code sample

        ```shell
        curl -L \
          -X DELETE \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/trade/order?order_id=1220968184320942080"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {}
        }
        ```
      tags:
        - Trade Execution & Order Management
      parameters:
        - name: order_id
          in: query
          required: true
          description: ID of the order to cancel.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /trade/estimate/buy_limit:
    get:
      operationId: estimate_max_buy_quantity
      summary: Estimate Maximum Buy Quantity
      description: |
        Estimate the maximum purchasable quantity for a security based on the current account
        balance and margin, given a specific order type and price.

        ## CLI

        ```bash
        longbridge max-qty <SYMBOL> --side buy --price <PRICE>
        ```

        ## Code sample

        ```shell
        curl -L \
          -H "Accept: application/json" \
          -H "Authorization: Bearer <YOUR_TOKEN>" \
          "https://openapi.longbridge.com/trade/estimate/buy_limit?symbol=AAPL.US&order_type=LO&side=Buy&price=200"
        ```

        ## Response

        ```json
        {
          "code": 0,
          "message": "success",
          "data": {
            "cash_max_qty": "0",
            "margin_max_qty": "1859"
          }
        }
        ```
      tags:
        - Trade Execution & Order Management
      parameters:
        - name: symbol
          in: query
          required: true
          description: 'Security symbol (e.g. `AAPL.US`, `700.HK`).'
          schema:
            type: string
            maxLength: 32
            minLength: 4
            pattern: '^([\w.]*\.[A-Za-z][A-Za-z])$'
        - name: order_type
          in: query
          required: true
          description: |
            Order type. One of:
            `LO` (Limit), `ELO` (Enhanced Limit), `MO` (Market), `LIT` (Limit If Touched),
            `MIT` (Market If Touched), `TSLPAMT` (Trailing Stop Limit by Amount),
            `TSMAMT` (Trailing Stop Market by Amount), `TSMPCT` (Trailing Stop Market by Percent),
            `TSLPPCT` (Trailing Stop Limit by Percent), `AO` (Auction), `ALO` (Auction Limit),
            `ODD` (Odd Lot), `SLO` (Special Limit).
          schema:
            type: string
            enum:
              - LO
              - ELO
              - MO
              - LIT
              - MIT
              - TSLPAMT
              - TSMAMT
              - TSMPCT
              - UnknownOrderType
              - AO
              - ALO
              - ODD
              - TSLPPCT
              - SLO
        - name: side
          in: query
          required: true
          description: Order side. One of `Buy`, `Sell`.
          schema:
            type: string
            enum:
              - UnknownSide
              - Buy
              - Sell
        - name: price
          in: query
          required: false
          description: Limit price. Required for limit order types (e.g. `LO`, `LIT`).
          schema:
            type: string
            nullable: true
        - name: currency
          in: query
          required: false
          description: Settlement currency override (e.g. `USD`, `HKD`).
          schema:
            type: string
            nullable: true
        - name: market
          in: query
          required: false
          description: Market override. One of `US`, `HK`, `SH`, `SZ`, `SG`, `AU`, `JP`, `UK`, `DE`.
          schema:
            type: string
            nullable: true
            enum:
              - UnknownMarket
              - DE
              - JP
              - SH
              - SZ
              - UK
              - AU
              - HK
              - SG
              - US
        - name: fractional_shares
          in: query
          required: false
          description: Whether to allow fractional share quantities in the estimate.
          schema:
            type: boolean
            nullable: true
        - name: order_id
          in: query
          required: false
          description: Original order ID when estimating for an order modification scenario.
          schema:
            type: string
            nullable: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      cash_max_qty:
                        type: string
                        nullable: true
                        description: Maximum purchasable quantity using available cash only.
                      margin_max_qty:
                        type: string
                        nullable: true
                        description: Maximum purchasable quantity including available financing margin.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
